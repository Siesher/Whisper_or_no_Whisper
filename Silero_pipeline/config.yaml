# ===================================================================
# Конфигурационный файл для пайплайна дообучения Silero
# ===================================================================

# --- 1. ПУТИ И НАСТРОЙКИ ОКРУЖЕНИЯ ---
paths:
  # Путь к вашему JSON-файлу с разметкой
  data_json: "my_dataset.json"

environment:
  # Репозиторий Silero, который будет автоматически склонирован
  silero_repo_url: "https://github.com/snakers4/silero-models.git"
  # Папка, куда будет склонирован репозиторий
  silero_repo_path: "silero-models"

# --- 2. ВЫБОР БАЗОВОЙ МОДЕЛИ ---
model:
  # URL для скачивания предобученной модели Silero (например, v4 для русского)
  # Вы можете найти другие модели на странице релизов Silero
  base_model_url: "https://models.silero.ai/models/STT/ru/v4_ru.pt"
  
  # Название для вашей дообученной модели
  finetuned_model_name: "my_finetuned_silero_v4.pt"

# --- 3. ПОДГОТОВКА ДАННЫХ ---
data_prep:
  # Доля данных, которая пойдет в тестовую выборку (например, 0.1 = 10%)
  test_size: 0.1
  # Папка внутри репозитория silero-models для хранения подготовленных данных
  prepared_data_dir: "prepared_data"

# --- 4. ПАРАМЕТРЫ ДООБУЧЕНИЯ ---
training:
  # Основные параметры, которые будут переданы в скрипт обучения Silero
  batch_size: 16
  num_epochs: 20  # Для реальной задачи может потребоваться больше
  learning_rate: 0.001
  # Директория для сохранения логов и чекпоинтов внутри репозитория silero-models
  work_dir: "work_dir_finetune"