<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1035;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#C4B5FD;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C4B5FD" />
      <stop offset="50%" style="stop-color:#E9D5FF" />
      <stop offset="100%" style="stop-color:#C4B5FD" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Stars -->
  <circle cx="85" cy="65" r="2" fill="#C4B5FD" opacity="0.4"/>
  <circle cx="195" cy="215" r="1.5" fill="#818CF8" opacity="0.3"/>
  <circle cx="330" cy="42" r="1" fill="#E9D5FF" opacity="0.5"/>
  <circle cx="505" cy="248" r="2" fill="#C4B5FD" opacity="0.3"/>
  <circle cx="710" cy="58" r="1.5" fill="#818CF8" opacity="0.4"/>
  <circle cx="855" cy="228" r="1" fill="#E9D5FF" opacity="0.3"/>
  <circle cx="945" cy="92" r="2" fill="#C4B5FD" opacity="0.4"/>
  <circle cx="1065" cy="188" r="1.5" fill="#818CF8" opacity="0.3"/>
  <circle cx="1115" cy="52" r="1" fill="#E9D5FF" opacity="0.5"/>
  <circle cx="155" cy="258" r="1" fill="#C4B5FD" opacity="0.3"/>
  <circle cx="555" cy="272" r="1.5" fill="#818CF8" opacity="0.2"/>
  <circle cx="645" cy="32" r="2" fill="#E9D5FF" opacity="0.3"/>
  <circle cx="420" cy="78" r="1" fill="#C4B5FD" opacity="0.35"/>
  <circle cx="780" cy="255" r="1.5" fill="#818CF8" opacity="0.25"/>

  <!-- Left decorative: sound waveform -->
  <g transform="translate(130, 150)" opacity="0.18" filter="url(#softGlow)">
    <line x1="-60" y1="0" x2="-60" y2="0" stroke="#818CF8" stroke-width="2" stroke-linecap="round"/>
    <line x1="-50" y1="-15" x2="-50" y2="15" stroke="#818CF8" stroke-width="2" stroke-linecap="round"/>
    <line x1="-40" y1="-30" x2="-40" y2="30" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round"/>
    <line x1="-30" y1="-45" x2="-30" y2="45" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round"/>
    <line x1="-20" y1="-35" x2="-20" y2="35" stroke="#E9D5FF" stroke-width="2" stroke-linecap="round"/>
    <line x1="-10" y1="-50" x2="-10" y2="50" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#E9D5FF" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="-55" x2="10" y2="55" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="-35" x2="20" y2="35" stroke="#E9D5FF" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="-45" x2="30" y2="45" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="-25" x2="40" y2="25" stroke="#818CF8" stroke-width="2" stroke-linecap="round"/>
    <line x1="50" y1="-15" x2="50" y2="15" stroke="#818CF8" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="-5" x2="60" y2="5" stroke="#818CF8" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Right decorative: ensemble voting -->
  <g transform="translate(1070, 150)" opacity="0.15" filter="url(#softGlow)">
    <!-- Three model nodes -->
    <circle cx="-40" cy="-40" r="6" fill="#C4B5FD" opacity="0.5"/>
    <circle cx="-40" cy="0" r="6" fill="#818CF8" opacity="0.5"/>
    <circle cx="-40" cy="40" r="6" fill="#E9D5FF" opacity="0.5"/>
    <!-- Merge node -->
    <circle cx="30" cy="0" r="10" fill="#C4B5FD" opacity="0.3"/>
    <circle cx="30" cy="0" r="5" fill="#E9D5FF" opacity="0.4"/>
    <!-- Output -->
    <circle cx="60" cy="0" r="4" fill="#C4B5FD" opacity="0.5"/>
    <!-- Connections -->
    <line x1="-34" y1="-40" x2="20" y2="0" stroke="#C4B5FD" stroke-width="0.8" opacity="0.4"/>
    <line x1="-34" y1="0" x2="20" y2="0" stroke="#818CF8" stroke-width="0.8" opacity="0.4"/>
    <line x1="-34" y1="40" x2="20" y2="0" stroke="#E9D5FF" stroke-width="0.8" opacity="0.4"/>
    <line x1="40" y1="0" x2="56" y2="0" stroke="#C4B5FD" stroke-width="0.8" opacity="0.5"/>
    <!-- Labels -->
    <text x="-40" y="-50" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#C4B5FD" opacity="0.6">W</text>
    <text x="-40" y="-10" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#818CF8" opacity="0.6">S</text>
    <text x="-40" y="30" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#E9D5FF" opacity="0.6">V</text>
  </g>

  <!-- Center icon: microphone -->
  <g transform="translate(600, 72)" filter="url(#softGlow)" opacity="0.7">
    <!-- Mic body -->
    <rect x="-6" y="-20" width="12" height="24" rx="6" fill="none" stroke="#C4B5FD" stroke-width="1.2" opacity="0.6"/>
    <rect x="-3" y="-16" width="6" height="16" rx="3" fill="#C4B5FD" opacity="0.15"/>
    <!-- Mic arc -->
    <path d="M -14,0 Q -14,18 0,18 Q 14,18 14,0" fill="none" stroke="#E9D5FF" stroke-width="1" opacity="0.5"/>
    <!-- Mic stand -->
    <line x1="0" y1="18" x2="0" y2="26" stroke="#E9D5FF" stroke-width="1" opacity="0.5"/>
    <line x1="-8" y1="26" x2="8" y2="26" stroke="#E9D5FF" stroke-width="1" opacity="0.5"/>
    <!-- Sound waves -->
    <path d="M 20,-10 Q 28,-10 28,0 Q 28,10 20,10" fill="none" stroke="#818CF8" stroke-width="0.8" opacity="0.4"/>
    <path d="M 24,-16 Q 36,-16 36,0 Q 36,16 24,16" fill="none" stroke="#818CF8" stroke-width="0.6" opacity="0.3"/>
    <path d="M -20,-10 Q -28,-10 -28,0 Q -28,10 -20,10" fill="none" stroke="#818CF8" stroke-width="0.8" opacity="0.4"/>
    <path d="M -24,-16 Q -36,-16 -36,0 Q -36,16 -24,16" fill="none" stroke="#818CF8" stroke-width="0.6" opacity="0.3"/>
  </g>

  <!-- Accent line -->
  <rect x="0" y="282" width="1200" height="2" fill="url(#accent)"/>

  <!-- Title -->
  <text x="600" y="158" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="300" fill="url(#textGrad)" letter-spacing="5" filter="url(#glow)">
    Whisper or no Whisper
  </text>

  <!-- Subtitle -->
  <text x="600" y="198" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#A78BFA" letter-spacing="4" opacity="0.8">
    PRODUCTION-GRADE  RUSSIAN  ASR  PIPELINES
  </text>

  <!-- Tags -->
  <text x="600" y="238" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#818CF8" letter-spacing="2" opacity="0.5" font-style="italic">
    Whisper  ·  Wav2Vec2  ·  Silero  ·  YandexGPT  ·  Ensemble Voting
  </text>
</svg>
